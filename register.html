<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol | E-TİCARET</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container-fluid p-0">
        <div class="row g-0 login-section">
            
            <div class="col-lg-7 d-none d-lg-flex align-items-center justify-content-center position-relative" 
                 style="background: url('https://images.unsplash.com/photo-1556761175-5973dc0f32e7?q=80&w=1600') no-repeat center center; background-size: cover;">
                <div class="overlay-dark"></div>
                <div class="z-2 text-center text-white p-5 fade-in-up">
                    <h1 class="display-1 fw-bold mb-3 tracking-wide">ARAMIZA <br><span class="gold-text">KATILIN.</span></h1>
                    <p class="lead opacity-75 mb-4">Özel fırsatlar ve premium alışveriş deneyimi sizi bekliyor.</p>
                    <div class="d-flex justify-content-center gap-3">
                        <div class="text-center px-3 border-end border-secondary">
                            <h4 class="gold-text fw-bold mb-0">10K+</h4>
                            <small class="text-white opacity-75">Mutlu Müşteri</small>
                        </div>
                        <div class="text-center px-3">
                            <h4 class="gold-text fw-bold mb-0">%100</h4>
                            <small class="text-white opacity-75">Güvenli Alışveriş</small>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-5 d-flex align-items-center justify-content-center bg-deep position-relative overflow-hidden">
                <div class="glow-effect" style="background: #b8860b; top: 20%; left: 80%;"></div>

                <div class="form-box w-100 p-5 fade-in">
                    <div class="text-center mb-4">
                        <a href="index.html" class="text-decoration-none">
                            <h2 class="display-6 fw-bold gold-text mb-2">HESAP OLUŞTUR</h2>
                        </a>
                        <p class="text-muted">Formu doldurarak hemen üye olun.</p>
                    </div>

                    <form id="registerForm" novalidate>
                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control" placeholder="Ad" required>
                                    <label>Ad</label>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control" placeholder="Soyad" required>
                                    <label>Soyad</label>
                                </div>
                            </div>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" placeholder="name@example.com" required>
                            <label>E-Posta Adresi</label>
                        </div>
                        
                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="reg-password" placeholder="Şifre" required minlength="6">
                            <label>Şifre Oluştur</label>
                        </div>
                        <div class="form-floating mb-4">
                            <input type="password" class="form-control" id="reg-repassword" placeholder="Şifre Tekrar" required>
                            <label>Şifreyi Onayla</label>
                            <div class="invalid-feedback text-center mt-2">Şifreler eşleşmiyor!</div>
                        </div>

                        <div class="mb-4 p-3 rounded-4 border border-secondary border-opacity-25 bg-card">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="small text-white fw-bold"><i class="fas fa-robot gold-text me-2"></i>Ben Robot Değilim</span>
                                <a href="#" onclick="refreshCaptcha()" class="text-gold text-decoration-none small hover-underline">
                                    <i class="fas fa-sync-alt me-1"></i>Değiştir
                                </a>
                            </div>
                            <div class="d-flex gap-3">
                                <div id="captcha-display" class="captcha-box flex-grow-1 text-center text-white fw-bold fs-4 border border-secondary border-opacity-25 rounded-3 py-2 user-select-none" style="letter-spacing: 5px; background: rgba(255,255,255,0.05);">
                                    </div>
                                <input type="text" class="form-control text-center fs-5 fw-bold" id="captchaInput" placeholder="KOD" required style="width: 100px; letter-spacing: 2px;">
                            </div>
                            <div class="invalid-feedback d-block mt-2 text-center" id="captchaError" style="display:none !important">
                                Hatalı kod girdiniz!
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-3 fs-5 rounded-3 shadow-gold mb-4">
                            Üyeliği Tamamla <i class="fas fa-user-plus ms-2"></i>
                        </button>

                        <div class="text-center border-top border-secondary border-opacity-25 pt-4">
                            <span class="text-muted">Zaten hesabınız var mı?</span>
                            <a href="login.html" class="gold-text fw-bold text-decoration-none ms-1 hover-underline">Giriş Yap</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="js/captcha.js"></script>
    <script src="js/validation.js"></script>
</body>
</html>
