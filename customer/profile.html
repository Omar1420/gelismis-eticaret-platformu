<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Profilim | E-TİCARET</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css"> 
    </head>
<body class="bg-deep">

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top glass-nav">
        <div class="container">
            <a class="navbar-brand fw-bold gold-text" href="../index.html">E-TİCARET</a>
            <div class="ms-auto">
                <a href="../product-list.html" class="btn btn-outline-light btn-sm rounded-pill px-4">
                    <i class="fas fa-arrow-left me-2"></i>Alışverişe Dön
                </a>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row g-4">
            <div class="col-lg-3">
                <div class="account-sidebar list-group shadow-lg rounded-4 overflow-hidden">
                    <div class="p-4 bg-card text-center border-bottom border-secondary border-opacity-25">
                        <div class="width-80 height-80 rounded-circle bg-dark border border-gold d-flex align-items-center justify-content-center mx-auto mb-3" style="width: 80px; height: 80px;">
                            <i class="fas fa-user fa-2x gold-text"></i>
                        </div>
                        <h6 class="text-white fw-bold mb-0" id="sidebar-name">Kullanıcı</h6>
                        <small class="text-muted">Müşteri Hesabı</small>
                    </div>
                    <a href="profile.html" class="list-group-item list-group-item-action active">
                        <i class="fas fa-user-circle me-3"></i>Profil Bilgileri
                    </a>
                    <a href="orders.html" class="list-group-item list-group-item-action">
                        <i class="fas fa-box-open me-3"></i>Siparişlerim
                    </a>
                    <a href="../favorites.html" class="list-group-item list-group-item-action">
                        <i class="fas fa-heart me-3"></i>Favorilerim
                    </a>
                    <a href="#" onclick="logoutUser()" class="list-group-item list-group-item-action text-danger mt-3 border-top border-secondary border-opacity-25">
                        <i class="fas fa-sign-out-alt me-3"></i>Çıkış Yap
                    </a>
                </div>
            </div>

            <div class="col-lg-9">
                <div class="card bg-card border border-secondary border-opacity-25 shadow-lg rounded-4">
                    <div class="card-header bg-transparent border-bottom border-secondary border-opacity-25 py-3">
                        <h5 class="mb-0 fw-bold text-white"><i class="fas fa-user-edit gold-text me-2"></i>Hesap Bilgileri</h5>
                    </div>
                    <div class="card-body p-4">
                        <form>
                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <label class="form-label text-gold small fw-bold">Ad Soyad</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-dark border-secondary border-opacity-25 text-muted"><i class="fas fa-user"></i></span>
                                        <input type="text" class="form-control profile-input" id="profile-name">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-gold small fw-bold">E-Posta</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-dark border-secondary border-opacity-25 text-muted"><i class="fas fa-envelope"></i></span>
                                        <input type="email" class="form-control profile-input" id="profile-email" readonly>
                                    </div>
                                    <small class="text-muted x-small">*E-posta adresi güvenlik nedeniyle değiştirilemez.</small>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label text-gold small fw-bold">Telefon</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-dark border-secondary border-opacity-25 text-muted"><i class="fas fa-phone"></i></span>
                                    <input type="text" class="form-control profile-input" value="0555 555 55 55">
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label text-gold small fw-bold">Teslimat Adresi</label>
                                <textarea class="form-control profile-input" rows="3">Örnek Mahallesi, Teknoloji Caddesi, No: 1, İstanbul</textarea>
                            </div>

                            <div class="d-flex justify-content-end">
                                <button type="button" class="btn btn-primary px-5 rounded-pill shadow-gold" onclick="updateProfile()">
                                    <i class="fas fa-save me-2"></i>Değişiklikleri Kaydet
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    const nameInput = document.getElementById("profile-name");
    const emailInput = document.getElementById("profile-email");
    const sidebarName = document.getElementById("sidebar-name");

    document.addEventListener("DOMContentLoaded", () => {
        const user = JSON.parse(localStorage.getItem("currentUser"));
        if (user) {
            nameInput.value = user.name;
            emailInput.value = user.email;
            if(sidebarName) sidebarName.innerText = user.name;
        } else {
            window.location.href = "../login.html";
        }
    });

    function updateProfile() {
        const user = JSON.parse(localStorage.getItem("currentUser"));
        if (user) {
            user.name = nameInput.value;
            localStorage.setItem("currentUser", JSON.stringify(user));
            alert("Profil başarıyla güncellendi!");
            window.location.reload(); 
        }
    }

    function logoutUser() {
        localStorage.removeItem("currentUser");
        window.location.href = "../index.html";
    }
    </script>

</body>
</html>
